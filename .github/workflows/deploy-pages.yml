name: Deploy SWAP Ops Dashboard (Free)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "10 0 * * *" # 09:10 KST

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Init DB
        run: python3 scripts/init_db.py

      - name: Sync data from Redash
        if: ${{ secrets.REDASH_API_KEY != '' }}
        run: |
          python3 scripts/refresh_validate_daily.py \
            --api-key "${{ secrets.REDASH_API_KEY }}"

      - name: Seed sample when secret missing (first run fallback)
        if: ${{ secrets.REDASH_API_KEY == '' }}
        run: python3 scripts/seed_sample_data.py

      - name: Build static bundle
        run: python3 scripts/build_static_bundle.py

      - name: Add nojekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

